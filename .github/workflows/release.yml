name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: ''

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        run: |
          qmake YoloLabel.pro
          nmake

      - name: Deploy Qt dependencies
        run: |
          New-Item -ItemType Directory -Path deploy\YoloLabel
          Copy-Item release\YoloLabel.exe deploy\YoloLabel\
          windeployqt --release --no-translations deploy\YoloLabel\YoloLabel.exe

      - name: Package as ZIP
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path deploy\YoloLabel -DestinationPath "YoloLabel_${version}_Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: YoloLabel_${{ github.ref_name }}_Windows.zip

  build-ubuntu:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-base-dev-tools \
            libgl1-mesa-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Build
        run: |
          qmake6 YoloLabel.pro
          make -j$(nproc)

      - name: Package as TAR
        run: |
          version="${{ github.ref_name }}"
          mkdir -p package/YoloLabel
          cp YoloLabel package/YoloLabel/
          # Create a launcher script
          cat > package/YoloLabel/YoloLabel.sh <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/YoloLabel" "$@"
          EOF
          chmod +x package/YoloLabel/YoloLabel.sh
          tar -cvf "YoloLabel_${version}_Ubuntu22.04.tar" -C package YoloLabel

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build
          path: YoloLabel_${{ github.ref_name }}_Ubuntu22.04.tar

  release:
    name: Create GitHub Release
    needs: [build-windows, build-ubuntu]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YoloLabel ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            YoloLabel_${{ github.ref_name }}_Windows.zip
            YoloLabel_${{ github.ref_name }}_Ubuntu22.04.tar
